<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumenfall — Colección</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
  :root{ --bg:#08060e; --card-bg:rgba(18,14,28,0.95); --border:rgba(255,255,255,0.08); --text:rgba(255,255,255,0.92); --muted:rgba(255,255,255,0.4); }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:radial-gradient(ellipse at 20% 10%,rgba(120,255,160,0.03),transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(155,95,255,0.03),transparent 50%),var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);}
  .search-container{max-width:500px;margin:0 auto;padding:60px 20px 20px;text-align:center;}
  .logo{font-size:12px;font-weight:900;letter-spacing:6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .title{font-size:32px;font-weight:900;margin-bottom:24px;background:linear-gradient(135deg,rgba(120,255,160,0.9),rgba(155,95,255,0.9));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .search-box{width:100%;padding:14px 20px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;}
  .search-box:focus{border-color:rgba(120,255,160,0.3);}
  .search-box::placeholder{color:var(--muted);}
  .search-hint{margin-top:10px;font-size:12px;color:var(--muted);}
  .not-found{text-align:center;padding:40px;color:var(--muted);font-size:14px;display:none;}
  .user-header{max-width:1200px;margin:0 auto;padding:30px 20px 10px;text-align:center;display:none;}
  .user-name{font-size:24px;font-weight:900;}
  .user-stats{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:0.5px;}
  .section{max-width:1200px;margin:0 auto;padding:20px 20px 10px;display:none;}
  .section-title{font-size:11px;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;}
  .section-5 .section-title{color:rgba(255,210,60,0.5);}
  .section-4 .section-title{color:rgba(160,130,255,0.5);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;}
  .card{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--card-bg);transition:transform 0.15s,border-color 0.15s;cursor:default;}
  .card:hover{transform:scale(1.03);}
  .card.locked{filter:brightness(0.25) grayscale(0.8);opacity:0.5;}
  .card.locked:hover{transform:none;}
  .card.rarity-5{border-color:rgba(255,210,60,0.12);}
  .card.rarity-5:hover:not(.locked){border-color:rgba(255,210,60,0.3);}
  .card.rarity-4{border-color:rgba(160,130,255,0.1);}
  .card.rarity-4:hover:not(.locked){border-color:rgba(160,130,255,0.25);}
  .card.owned.rarity-5::before{content:"";position:absolute;top:-1px;left:15%;right:15%;height:2px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(255,210,60,0.6),transparent);z-index:5;}
  .card.owned.rarity-4::before{content:"";position:absolute;top:-1px;left:20%;right:20%;height:2px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(160,130,255,0.4),transparent);z-index:5;}
  .card-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:center top;display:block;}
  .card-overlay{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(0deg,var(--card-bg) 20%,transparent);pointer-events:none;}
  .card-info{position:absolute;bottom:0;left:0;right:0;padding:8px 10px 12px;}
  .card-stars{font-size:10px;letter-spacing:2px;margin-bottom:2px;}
  .star-5{color:rgba(255,210,60,0.9);}.star-4{color:rgba(160,130,255,0.9);}
  .card-name{font-size:13px;font-weight:900;color:var(--text);line-height:1.2;}
  .card-elem{display:inline-flex;align-items:center;gap:3px;margin-top:4px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);}
  .elem-electro{color:rgba(180,130,255,0.9);border-color:rgba(155,95,255,0.2);}
  .elem-fuego{color:rgba(255,160,90,0.9);border-color:rgba(255,120,60,0.2);}
  .elem-agua{color:rgba(130,220,255,0.9);border-color:rgba(110,210,255,0.2);}
  .elem-luz{color:rgba(255,225,110,0.9);border-color:rgba(255,210,80,0.2);}
  .elem-aire{color:rgba(140,255,180,0.9);border-color:rgba(120,255,160,0.2);}
  .elem-vacio{color:rgba(255,130,210,0.9);border-color:rgba(255,95,190,0.2);}
  .badge-equipped{position:absolute;top:8px;right:8px;padding:3px 7px;border-radius:6px;font-size:8px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:rgba(120,255,160,0.95);background:rgba(120,255,160,0.12);border:1px solid rgba(120,255,160,0.25);z-index:5;}
  .badge-copies{position:absolute;top:8px;left:8px;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:900;color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);z-index:5;}
  .lock-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;opacity:0.3;z-index:5;}
  .card-skill{position:absolute;inset:0;background:rgba(8,6,14,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;opacity:0;transition:opacity 0.15s;z-index:10;border-radius:14px;}
  .card:hover .card-skill{opacity:1;}
  .card.locked .card-skill{display:none;}
  .skill-name{font-size:15px;font-weight:900;margin-bottom:3px;}
  .skill-cmd{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;font-family:'Courier New',monospace;}
  .skill-desc{font-size:11px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.4;}
  .footer{text-align:center;padding:30px;font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:2px;text-transform:uppercase;}
  .update-info{text-align:center;font-size:11px;color:rgba(255,255,255,0.15);padding:10px;display:none;}
  @media(max-width:768px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}.title{font-size:24px;}.search-container{padding:40px 16px 16px;}.section{padding:16px 16px 8px;}}
</style>
</head>
<body>
<div class="search-container">
  <div class="logo">Lumenfall</div>
  <div class="title">Colección</div>
  <input type="text" class="search-box" id="searchInput" placeholder="Ingresá tu nombre de Twitch..." autofocus />
  <div class="search-hint">Escribí tu nombre de usuario de Twitch y presioná Enter</div>
</div>
<div class="not-found" id="notFound">No se encontró el usuario. ¿Escribiste bien tu nombre de Twitch?</div>
<div class="user-header" id="userHeader"><div class="user-name" id="userName"></div><div class="user-stats" id="userStats"></div></div>
<div class="section section-5" id="section5"><div class="section-title">★★★★★ 5 Estrellas</div><div class="grid" id="grid5"></div></div>
<div class="section section-4" id="section4"><div class="section-title">★★★★ 4 Estrellas</div><div class="grid" id="grid4"></div></div>
<div class="update-info" id="updateInfo"></div>
<div class="footer">Lumenfall · El Novato</div>
<script>
const ELEM_ICONS={electro:"⚡",fuego:"🔥",agua:"❄️",luz:"☀",aire:"🍃",vacio:"✦"};
const ELEM_NAMES={electro:"Electro",fuego:"Fuego",agua:"Agua",luz:"Luz",aire:"Aire",vacio:"Vacío"};
const IMG_BASE="img/";
let gameData=null;
async function loadData(){try{const r=await fetch("data.json?t="+Date.now());gameData=await r.json();}catch(e){console.error(e);}}
function createCard(n,info,owned,copies,eq){
  const is5=info.tier.startsWith("5"),r=is5?5:4;
  const card=document.createElement("div");
  card.className=`card ${owned?"owned":"locked"} rarity-${r}`;
  let b="";
  if(owned&&eq)b+=`<div class="badge-equipped">Equipado</div>`;
  if(owned&&copies>0)b+=`<div class="badge-copies">x${copies}</div>`;
  if(!owned)b+=`<div class="lock-icon">🔒</div>`;
  let sk="";
  if(owned&&info.skill)sk=`<div class="card-skill"><div class="skill-name">${info.skill}</div><div class="skill-cmd">${info.cmd||""}</div><div class="skill-desc">${info.desc||""}</div></div>`;
  card.innerHTML=`${b}<img class="card-img" src="${IMG_BASE}${n.replace(/ /g,"%20")}.png" alt="${n}" loading="lazy"/><div class="card-overlay"></div><div class="card-info"><div class="card-stars ${is5?"star-5":"star-4"}">${"★".repeat(r)}</div><div class="card-name">${n}</div><div class="card-elem elem-${info.elem}">${ELEM_ICONS[info.elem]||"?"} ${ELEM_NAMES[info.elem]||info.elem}</div></div>${sk}`;
  return card;
}
function showCollection(username){
  const l=username.trim().toLowerCase(),ud=gameData.users[l];
  const nf=document.getElementById("notFound"),h=document.getElementById("userHeader"),s5=document.getElementById("section5"),s4=document.getElementById("section4"),g5=document.getElementById("grid5"),g4=document.getElementById("grid4"),ui=document.getElementById("updateInfo");
  g5.innerHTML="";g4.innerHTML="";
  if(!ud){nf.style.display="block";h.style.display="none";s5.style.display="none";s4.style.display="none";ui.style.display="none";return;}
  nf.style.display="none";
  const inv=ud.inventory||{},eq=ud.equipped||"",pity=ud.pity||0,guar=ud.guarantee||false;
  let total=0,totalC=Object.keys(gameData.characters).length;
  const c5=[],c4=[];
  for(const[name,info]of Object.entries(gameData.characters)){
    const copies=inv[name]||0,owned=copies>0;if(owned)total++;
    const isEq=eq.toLowerCase()===name.toLowerCase();
    if(info.tier.startsWith("5"))c5.push({name,info,owned,copies,isEq});
    else c4.push({name,info,owned,copies,isEq});
  }
  const s=(a,b)=>{if(a.owned&&!b.owned)return-1;if(!a.owned&&b.owned)return 1;return a.name.localeCompare(b.name);};
  c5.sort(s);c4.sort(s);
  c5.forEach(c=>g5.appendChild(createCard(c.name,c.info,c.owned,c.copies,c.isEq)));
  c4.forEach(c=>g4.appendChild(createCard(c.name,c.info,c.owned,c.copies,c.isEq)));
  document.getElementById("userName").textContent=username;
  document.getElementById("userStats").textContent=`${total} / ${totalC} personajes · Pity: ${pity}/80 · Asegurado: ${guar?"SÍ":"NO"}`;
  h.style.display="block";s5.style.display="block";s4.style.display="block";
  if(gameData.lastUpdate){ui.textContent=`Última actualización: ${new Date(gameData.lastUpdate).toLocaleString("es-AR")}`;ui.style.display="block";}
}
document.getElementById("searchInput").addEventListener("keydown",(e)=>{if(e.key==="Enter"){const v=e.target.value.trim();if(v)showCollection(v);}});
const p=new URLSearchParams(window.location.search),u=p.get("user");
loadData().then(()=>{if(u){document.getElementById("searchInput").value=u;showCollection(u);}});
</script>
</body>
</html>
